<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Ирина Землякова — Домашний кондитер</title>
    <script>
      // SPA redirect hack for GitHub Pages.
      // Converts /irina-sweet-creations/some/path?x=1 -> /irina-sweet-creations/?/some/path&x=1
      // index.html will decode it back into the real path.
      (function () {
        var segmentCount = 1; // number of path segments to keep (repo name)
        var l = window.location;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname
              .split("/")
              .slice(0, 1 + segmentCount)
              .join("/") +
            "/?/" +
            l.pathname.slice(1).split("/").slice(segmentCount).join("/").replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
